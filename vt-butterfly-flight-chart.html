<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vermont Butterfly Flight Chart</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         margin: 0; padding: 8px; color: #222; background: #fafafa; }
  h1 { font-size: 16px; margin: 0 0 2px 0; }
  .intro { font-size: 11px; color: #555; margin: 0 0 6px 0; max-width: 900px; line-height: 1.35; }
  .controls { display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
              padding: 5px 6px; background: #fff; border: 1px solid #ddd;
              border-radius: 4px; margin-bottom: 4px; font-size: 11px; }
  .controls label { color: #444; display: inline-flex; align-items: center; gap: 3px; }
  .controls select, .controls input[type=text] {
    padding: 2px 4px; border: 1px solid #ccc; border-radius: 3px; font-size: 11px;
  }
  .controls input[type=text] { width: 110px; }
  .controls .btn { padding: 2px 6px; border: 1px solid #ccc; background: #fff;
                   border-radius: 3px; cursor: pointer; font-size: 11px; }
  .controls .btn.active { background: #2c7a3f; color: #fff; border-color: #2c7a3f; }
  .meta { font-size: 10px; color: #666; }
  .table-wrap { background: #fff; border: 1px solid #ddd; border-radius: 4px;
                overflow-x: auto; max-height: calc(100vh - 130px); overflow-y: auto; }
  table { border-collapse: collapse; font-size: 11px; width: auto; }
  thead { position: sticky; top: 0; background: #fdf6e3; z-index: 2; }
  thead tr.month-row th { padding: 2px 0; font-size: 10px; font-weight: 600;
                          color: #555; border-bottom: 1px solid #eee; }
  thead tr.week-row th { padding: 1px 0; font-size: 8px; color: #888;
                         font-weight: normal; border-bottom: 1px solid #ccc; }
  thead th.species-col { background: #fdf6e3; padding: 3px 5px;
                         font-size: 11px; text-align: left; cursor: pointer;
                         user-select: none; border-right: 1px solid #ddd; }
  thead th.species-col.sortable:hover { background: #f5ecca; }
  thead th.week-cell { width: 11px; cursor: pointer; user-select: none; }
  thead th.week-cell.sorted { background: #ffd54f; color: #000; font-weight: 700;
                              box-shadow: inset 1px 0 0 #f57f17, inset -1px 0 0 #f57f17; }
  thead th.week-cell:hover { background: #e0f2fe; }
  /* Compact species columns - max widths with truncation */
  td.col-sci  { max-width: 130px; }
  td.col-com  { max-width: 130px; }
  td.col-fam  { max-width: 80px; }
  td.col-n    { max-width: 50px; text-align: right; }
  th.col-sci  { min-width: 90px; }
  th.col-com  { min-width: 90px; }
  th.col-fam  { min-width: 60px; }
  th.col-n    { min-width: 32px; text-align: right; }
  tbody td.species-cell { padding: 2px 5px; border-bottom: 1px solid #eee;
                          border-right: 1px solid #eee; white-space: nowrap;
                          overflow: hidden; text-overflow: ellipsis; }
  tbody td.species-cell.sci { font-style: italic; }
  tbody td.week-cell { width: 11px; height: 22px; padding: 0;
                       border-bottom: 1px solid #f0f0f0; position: relative;
                       text-align: center; vertical-align: middle; }
  tbody td.week-cell.highlight { background: #fff3a3;
                                 box-shadow: inset 1px 0 0 #f57f17, inset -1px 0 0 #f57f17; }
  /* Bar mode: bar is centered vertically; grows taller from center line as count rises */
  .bar-mode tbody td.week-cell .bar {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    background: #2c7a3f; width: 7px;
  }
  .bar-mode tbody td.week-cell .bar.empty { background: transparent; }
  /* Heatmap mode */
  .heatmap-mode tbody td.week-cell { padding: 0; }
  .heatmap-mode tbody td.week-cell .cell {
    width: 100%; height: 100%; display: block;
  }
  tbody tr:hover { background: #fafafa; }
  tbody td.week-cell:hover { outline: 1px solid #2c7a3f; cursor: help; }
  .pagination { padding: 5px 6px; display: flex; gap: 3px; align-items: center;
                font-size: 11px; flex-wrap: wrap; }
  .pagination button { padding: 2px 6px; border: 1px solid #ccc; background: #fff;
                       border-radius: 3px; cursor: pointer; font-size: 10px; }
  .pagination button.active { background: #2c7a3f; color: #fff; border-color: #2c7a3f; }
  .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
  .empty-row td.week-cell { background: #fcfcfc; }
  .footer { margin-top: 6px; font-size: 10px; color: #888; line-height: 1.35; }
  .tooltip { position: fixed; background: #222; color: #fff; padding: 4px 6px;
             border-radius: 3px; font-size: 10px; pointer-events: none;
             z-index: 100; display: none; white-space: nowrap; }
</style>
</head>

<h1>Vermont Butterfly Flight Chart</h1>
<p class="intro">
  Relative frequency of adult sightings per week. Each species is normalized to its own
  annual peak. Click any column to sort &mdash; including any week to rank species by
  activity in that week.
</p>

<div class="controls">
  <label>View:
    <button id="modeBar" class="btn active">Chart</button>
    <button id="modeHeat" class="btn">Heatmap</button>
  </label>
  <label>Metric:
    <button id="metricObs" class="btn active" title="One per record (sighting frequency)">Sightings</button>
    <button id="metricInd" class="btn" title="Sum of individualCount per record (capped at 5,000)">Individuals</button>
  </label>
  <label>Sort:
    <select id="sortSel">
      <option value="taxonomic">Taxonomic (Pelham 2025)</option>
      <option value="sci">Scientific name (A&ndash;Z)</option>
      <option value="common">Common name (A&ndash;Z)</option>
      <option value="family">Family</option>
      <option value="total">Total observations</option>
    </select>
  </label>
  <label>Search:
    <input type="text" id="searchInput" placeholder="species, family...">
  </label>
  <label>Show:
    <select id="pageSize">
      <option value="20">20</option>
      <option value="50" selected>50</option>
      <option value="100">100</option>
      <option value="9999">All</option>
    </select> per page
  </label>
  <span class="meta" id="metaCount"></span>
</div>

<div class="table-wrap">
  <table id="chart" class="bar-mode">
    <thead>
      <tr class="month-row">
        <th class="species-col col-com" rowspan="2" data-sort="common">Common</th>
        <th class="species-col col-sci" rowspan="2" data-sort="sci">Scientific</th>
        <th class="species-col col-fam" rowspan="2" data-sort="family">Family</th>
        <th class="species-col col-n" rowspan="2" data-sort="total" title="Total observations">N</th>
        <!-- month headers added by JS -->
      </tr>
      <tr class="week-row">
        <!-- week numbers added by JS -->
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="pagination" id="pagination"></div>

<div class="footer" id="footer"></div>

<div class="tooltip" id="tooltip"></div>

// === Setup ===
// Show only Mar-Nov (weeks 9-47); skip Jan/Feb/Dec since VT has near-zero activity
const START_WEEK = 9;
const END_WEEK = 47;
// Approximate first-day-of-each-month in week-of-year (ISO weeks)
const MONTHS = [
  {label:'Mar', wk:9},  {label:'Apr', wk:14}, {label:'May', wk:18},
  {label:'Jun', wk:22}, {label:'Jul', wk:27}, {label:'Aug', wk:31},
  {label:'Sep', wk:35}, {label:'Oct', wk:40}, {label:'Nov', wk:44},
];

// State
let mode = 'bar';                 // 'bar' or 'heatmap'
let metric = 'obs';               // 'obs' (sightings) or 'ind' (individuals)
let sortMode = 'taxonomic';       // matches dropdown values OR 'week:N'
let sortAsc = true;               // taxonomic/scientific = asc; week/total = desc default
let searchTerm = '';
let pageSize = 50;
let currentPage = 1;
// ISO week-of-year (Mon-start), matching the data aggregation in Python
function isoWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = date.getUTCDay() || 7;        // Sun=0 -> 7
  date.setUTCDate(date.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}
// Default highlight = current ISO week so users see "what's flying right now" when the page opens.
// If today falls outside the visible range (Mar-Nov), no highlight.
let highlightedWeek = (() => {
  const w = isoWeek(new Date());
  return (w >= 9 && w <= 47) ? w : null;
})();

// Helpers to read the active metric off a species row
function relOf(r, wIdx) { return metric === 'ind' ? r.relInd[wIdx] : r.relObs[wIdx]; }
function cntOf(r, wIdx) { return metric === 'ind' ? r.weeklyInd[wIdx] : r.weeklyObs[wIdx]; }
function totOf(r)      { return metric === 'ind' ? r.totalInd : r.totalObs; }

// Build week headers
const monthRow = document.querySelector('thead tr.month-row');
const weekRow = document.querySelector('thead tr.week-row');
const monthByWeek = {};
MONTHS.forEach(m => { monthByWeek[m.wk] = m.label; });

for (let w = START_WEEK; w <= END_WEEK; w++) {
  // month label cell only at start of each month
  const isMonthStart = monthByWeek[w];
  if (isMonthStart) {
    // count how many weeks until next month
    const nextMonth = MONTHS.find(m => m.wk > w);
    const span = nextMonth ? nextMonth.wk - w : (END_WEEK + 1 - w);
    const th = document.createElement('th');
    th.colSpan = span;
    th.textContent = isMonthStart;
    monthRow.appendChild(th);
  }
  // week cell
  const wkTh = document.createElement('th');
  wkTh.className = 'week-cell';
  wkTh.textContent = w;
  wkTh.dataset.week = w;
  wkTh.title = 'Week ' + w + ' — click to sort by activity';
  wkTh.addEventListener('click', () => {
    if (sortMode === 'week:' + w) sortAsc = !sortAsc;
    else { sortMode = 'week:' + w; sortAsc = false; highlightedWeek = w; }
    document.getElementById('sortSel').value = '';
    render();
  });
  weekRow.appendChild(wkTh);
}

// Species column header sort
document.querySelectorAll('thead th.species-col[data-sort]').forEach(th => {
  th.classList.add('sortable');
  th.addEventListener('click', () => {
    const k = th.dataset.sort;
    if (sortMode === k) sortAsc = !sortAsc;
    else {
      sortMode = k;
      sortAsc = (k === 'sci' || k === 'common' || k === 'family');
      // keep highlightedWeek so the "today" marker stays visible after sort changes
    }
    // sync dropdown
    const sel = document.getElementById('sortSel');
    if (k === 'sci') sel.value = 'sci';
    else if (k === 'common') sel.value = 'common';
    else if (k === 'family') sel.value = 'family';
    else if (k === 'total') sel.value = 'total';
    render();
  });
});

// Mode buttons
document.getElementById('modeBar').addEventListener('click', () => {
  mode = 'bar';
  document.getElementById('modeBar').classList.add('active');
  document.getElementById('modeHeat').classList.remove('active');
  render();
});
document.getElementById('modeHeat').addEventListener('click', () => {
  mode = 'heatmap';
  document.getElementById('modeHeat').classList.add('active');
  document.getElementById('modeBar').classList.remove('active');
  render();
});

// Metric toggle (sightings vs individuals)
document.getElementById('metricObs').addEventListener('click', () => {
  metric = 'obs';
  document.getElementById('metricObs').classList.add('active');
  document.getElementById('metricInd').classList.remove('active');
  render();
});
document.getElementById('metricInd').addEventListener('click', () => {
  metric = 'ind';
  document.getElementById('metricInd').classList.add('active');
  document.getElementById('metricObs').classList.remove('active');
  render();
});

// Sort dropdown
document.getElementById('sortSel').addEventListener('change', e => {
  sortMode = e.target.value;
  // keep highlightedWeek so the "today" marker stays visible after sort changes
  if (sortMode === 'taxonomic') sortAsc = true;
  else if (sortMode === 'total') sortAsc = false;
  else sortAsc = true;
  render();
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  currentPage = 1;
  render();
});

// Page size
document.getElementById('pageSize').addEventListener('change', e => {
  pageSize = parseInt(e.target.value, 10);
  currentPage = 1;
  render();
});

// Tooltip
const tooltip = document.getElementById('tooltip');
function showTip(html, evt) {
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  tooltip.style.left = (evt.clientX + 12) + 'px';
  tooltip.style.top = (evt.clientY + 12) + 'px';
}
function hideTip() { tooltip.style.display = 'none'; }

// === Sort/filter/render ===
function sortedRows() {
  const rows = DATA.species.slice();
  let cmp;
  if (sortMode.startsWith('week:')) {
    const w = parseInt(sortMode.split(':')[1], 10);
    cmp = (a,b) => (relOf(a, w-1) - relOf(b, w-1));
  } else if (sortMode === 'sci') {
    cmp = (a,b) => a.sci.localeCompare(b.sci);
  } else if (sortMode === 'common') {
    cmp = (a,b) => (a.common||'￿').localeCompare(b.common||'￿');
  } else if (sortMode === 'family') {
    cmp = (a,b) => (a.family||'').localeCompare(b.family||'') || a.sci.localeCompare(b.sci);
  } else if (sortMode === 'total') {
    cmp = (a,b) => totOf(a) - totOf(b);
  } else {
    // taxonomic = original order in DATA.species (already Pelham-sorted)
    cmp = (a,b) => DATA.species.indexOf(a) - DATA.species.indexOf(b);
  }
  rows.sort(cmp);
  if (!sortAsc) rows.reverse();
  return rows;
}

function filtered(rows) {
  if (!searchTerm) return rows;
  return rows.filter(r =>
    r.sci.toLowerCase().includes(searchTerm) ||
    (r.common||'').toLowerCase().includes(searchTerm) ||
    (r.family||'').toLowerCase().includes(searchTerm)
  );
}

function render() {
  // sort indicator on week headers
  document.querySelectorAll('thead th.week-cell').forEach(th => {
    th.classList.toggle('sorted', highlightedWeek !== null && parseInt(th.dataset.week,10)===highlightedWeek);
  });

  const all = filtered(sortedRows());
  const totalPages = Math.max(1, Math.ceil(all.length / pageSize));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * pageSize;
  const pageRows = all.slice(start, start + pageSize);

  const tbody = document.querySelector('#chart tbody');
  tbody.innerHTML = '';

  // Set table mode class
  const tbl = document.getElementById('chart');
  tbl.className = mode === 'bar' ? 'bar-mode' : 'heatmap-mode';

  for (const r of pageRows) {
    const tr = document.createElement('tr');
    if (totOf(r) === 0) tr.classList.add('empty-row');

    const tdCom = document.createElement('td');
    tdCom.className = 'species-cell col-com';
    tdCom.textContent = r.common || '';
    tdCom.title = r.common || '';
    tr.appendChild(tdCom);

    const tdSci = document.createElement('td');
    tdSci.className = 'species-cell sci col-sci';
    tdSci.textContent = r.sci;
    tdSci.title = r.sci;
    tr.appendChild(tdSci);

    const tdFam = document.createElement('td');
    tdFam.className = 'species-cell col-fam';
    tdFam.textContent = r.family || '';
    tdFam.title = r.family || '';
    tr.appendChild(tdFam);

    const tdN = document.createElement('td');
    tdN.className = 'species-cell col-n';
    tdN.textContent = totOf(r).toLocaleString();
    tdN.title = (metric === 'ind' ? 'Total individuals' : 'Total sightings');
    tr.appendChild(tdN);

    for (let w = START_WEEK; w <= END_WEEK; w++) {
      const td = document.createElement('td');
      td.className = 'week-cell';
      if (highlightedWeek === w) td.classList.add('highlight');
      const rel = relOf(r, w-1);
      const cnt = cntOf(r, w-1);
      if (mode === 'bar') {
        if (rel > 0) {
          const bar = document.createElement('span');
          bar.className = 'bar';
          // height range: 2px (min) to 18px (max) to fit row height
          const h = Math.max(2, Math.round(rel * 18));
          bar.style.height = h + 'px';
          td.appendChild(bar);
        }
      } else {
        // heatmap
        const cell = document.createElement('span');
        cell.className = 'cell';
        if (rel > 0) {
          // green scale from light to dark
          const alpha = 0.15 + 0.85 * rel;
          cell.style.background = 'rgba(44,122,63,' + alpha.toFixed(3) + ')';
        }
        td.appendChild(cell);
      }
      // Tooltip events
      td.addEventListener('mouseenter', evt => {
        const html = `<strong>${r.sci}</strong><br>` +
                     (r.common ? r.common + '<br>' : '') +
                     `Week ${w} &middot; ${cnt.toLocaleString()} ${metric==='ind'?'individuals':'sightings'} &middot; ${(rel*100).toFixed(0)}% of peak`;
        showTip(html, evt);
      });
      td.addEventListener('mousemove', evt => {
        tooltip.style.left = (evt.clientX + 12) + 'px';
        tooltip.style.top = (evt.clientY + 12) + 'px';
      });
      td.addEventListener('mouseleave', hideTip);
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }

  // Meta count
  const metricCount = metric === 'ind'
    ? `${DATA.meta.totalIndividuals.toLocaleString()} individuals`
    : `${DATA.meta.totalRecords.toLocaleString()} sightings`;
  document.getElementById('metaCount').textContent =
    `${all.length.toLocaleString()} species shown of ${DATA.species.length} (${metricCount})`;

  // Pagination
  const pag = document.getElementById('pagination');
  pag.innerHTML = '';
  if (totalPages > 1) {
    const mkBtn = (label, page, disabled, active) => {
      const b = document.createElement('button');
      b.textContent = label;
      if (disabled) b.disabled = true;
      if (active) b.classList.add('active');
      b.addEventListener('click', () => { currentPage = page; render(); });
      return b;
    };
    pag.appendChild(mkBtn('Prev', currentPage-1, currentPage===1));
    // page buttons (compact)
    const pages = [];
    pages.push(1);
    if (currentPage > 3) pages.push('...');
    for (let p = Math.max(2, currentPage-1); p <= Math.min(totalPages-1, currentPage+1); p++) pages.push(p);
    if (currentPage < totalPages-2) pages.push('...');
    if (totalPages > 1) pages.push(totalPages);
    for (const p of pages) {
      if (p === '...') {
        const span = document.createElement('span');
        span.textContent = '…'; span.style.padding = '0 4px';
        pag.appendChild(span);
      } else {
        pag.appendChild(mkBtn(String(p), p, false, p===currentPage));
      }
    }
    pag.appendChild(mkBtn('Next', currentPage+1, currentPage===totalPages));
    const info = document.createElement('span');
    info.style.marginLeft = '12px';
    info.style.color = '#666';
    info.textContent = `Page ${currentPage} of ${totalPages}`;
    pag.appendChild(info);
  }
}

// Footer info
const meta = DATA.meta;
let unmatchStr = '';
if (meta.unmatchedSpecies && Object.keys(meta.unmatchedSpecies).length > 0) {
  const items = Object.entries(meta.unmatchedSpecies)
    .sort((a,b) => b[1]-a[1])
    .map(([s,c]) => `${s} (${c})`)
    .join(', ');
  unmatchStr = ` &middot; Unmatched (vagrants/ambiguous, ${meta.unmatchedRecords} records): ${items}`;
}
document.getElementById('footer').innerHTML =
  `Data: ${meta.totalRecords.toLocaleString()} adult sighting records ` +
  `(${meta.totalIndividuals.toLocaleString()} individuals when summed), ` +
  `${meta.dateRange[0]} to ${meta.dateRange[1]} &middot; ` +
  `${meta.speciesWithData} of ${meta.speciesCount} accepted species have data &middot; ` +
  `Filters: lifeStage Adult or unspecified, occurrenceStatus PRESENT, Vermont &middot; ` +
  `individualCount capped at ${meta.countCap.toLocaleString()} per record (handles data-entry typos); empty count = 1${unmatchStr}`;

render();
</script>
</body>
</html>
